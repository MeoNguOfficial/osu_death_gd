name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main
# Temp
jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          path: ./  # Nếu CMakeLists.txt nằm ở ngoài cùng
          combine: true
